# ---- programs ----

terminal = "kitty"
launcher = "dmenu_run"
scratchpad = "kitty"
scratchpad_class = "vwm-scratchpad"

# ---- font ----

font = "FiraCode Nerd Font"
font_size = 11

# ---- layout ----

gap_px = 10
border_width = 2
default_mfact = 0.5

# ---- bar ----

bar_height = 22
bar_outer_gap = 0

# ---- workspace behavior ----

sync_workspaces = true

# ---- colors ----

bar_bg = 0x111111
bar_fg = 0xd0d0d0

border_active = 0xff8800
border_inactive = 0x444444

workspace_current = 0xff8800
workspace_occupied = 0x8c8c8c
workspace_empty = 0x4a4a4a
