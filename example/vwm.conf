font_family "FiraCode Nerd Font"
font_size 11

terminal "kitty"
launcher "rofi -show drun"
scratchpad "kitty"
scratchpad_class "vwm-scratchpad"

border_width 2
gap_px 10
bar_height 28
bar_outer_gap 0
default_mfact 0.5
sync_workspaces true

bar_bg 0x111111
bar_fg 0xd0d0d0
border_active 0xff8800
border_inactive 0x444444
workspace_current 0xff8800
workspace_occupied 0x8c8c8c
workspace_empty 0x4a4a4a

bar_style floating
bar_float_margin_x 24
bar_float_margin_y 10
bar_transparent_background false

volume_bar_enabled true
volume_bar_width 36
volume_bar_height 8
volume_bar_radius 4

volume_bar_bg 0x2a2a2a
volume_bar_fg_low 0x88c0d0
volume_bar_fg_mid 0xa3be8c
volume_bar_fg_high 0xebcb8b
volume_bar_fg_muted 0xbf616a

module_gap 8
module_padding_x 10
module_padding_y 4
module_radius 12
module_bg 0x1b1b1b
module_fg 0xf2f2f2
module_border 0x2a2a2a
module_border_width 0

float class loom-ui
float class pavucontrol
float class feh
float class mpv
float class scratchpad-term

workspace_rule 3 class loom-ui
workspace_rule 4 class pavucontrol

command terminal kitty
command launcher rofi -show drun
command mixer pavucontrol
command loom kitty --class loom-ui

key mod+Return spawn terminal
key mod+p spawn launcher
key mod+Shift+m spawn mixer
key mod+Shift+l spawn loom

scratchpad term kitty --class scratchpad-term
key mod+grave scratchpad term

key mod+Shift+r reload
key mod+Shift+q quit
key mod+f fullscreen

bar_left monitor
bar_left sync
bar_left workspaces

bar_center title

bar_right volume
bar_right clock "%Y-%m-%d %H:%M"
