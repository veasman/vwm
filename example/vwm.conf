general {
    font_family "FiraCode Nerd Font"
    font_size 11

    terminal "kitty"
    launcher "rofi -show drun"

    border_width 2
    gap_px 15
    default_mfact 0.5
    sync_workspaces true
}

colors {
    bar_bg 0x111111
    bar_fg 0xd0d0d0

    border_active 0xff8800
    border_inactive 0x444444

    workspace_current 0xff8800
    workspace_occupied 0x8c8c8c
    workspace_empty 0x4a4a4a
}

bar {
    height 25
    style floating
    presentation accent

    float_margin_x 0
    float_margin_y 10
    transparent_background true

    module_gap 20
    module_padding_x 12
    module_padding_y 5
    module_radius 12

    module_bg 0x1b1b1b
    module_fg 0xf2f2f2
    module_border 0x282828
    module_border_width 1

    volume_show_bar true
    volume_bar_width 36
    volume_bar_height 8
    volume_bar_radius 4

    volume_bar_bg 0x2a2a2a
    volume_low 0x88c0d0
    volume_mid 0xa3be8c
    volume_high 0xebcb8b
    volume_muted 0xbf616a

    accent_monitor 0x88c0d0
    accent_sync_enabled 0xa3be8c
    accent_sync_disabled 0xebcb8b

    accent_network_up 0x88c0d0
    accent_network_down 0xbf616a

    accent_battery_full 0xa3be8c
    accent_battery_charging 0x88c0d0
    accent_battery_normal 0xf2f2f2
    accent_battery_low 0xebcb8b
    accent_battery_critical 0xbf616a

    accent_clock 0xd7ba7d
}

rules {
    float class "loom-ui"
    float class "pavucontrol"
    float class "feh"
    float class "mpv"
    float class "scratchpad-term"

    #workspace 4 class "pavucontrol"
}

commands {
    command "terminal" "kitty"
    command "launcher" "rofi -show drun"
    command "mixer" "pavucontrol"
}

scratchpads {
    scratchpad "term" command "kitty --class scratchpad-term"
    scratchpad "term" class "scratchpad-term"

    scratchpad "loom" command "kitty --class loom-ui"
    scratchpad "loom" class "loom-ui"
}

binds {
    bind "mod+Return" spawn "terminal"
    bind "mod+d" spawn "launcher"
    bind "mod+Shift+m" spawn "mixer"

    bind "mod+apostrophe" scratchpad "term"

    bind "mod+j" focus_next
    bind "mod+k" focus_prev

    bind "mod+h" focus_monitor_prev
    bind "mod+l" focus_monitor_next

    bind "mod+Shift+h" send_monitor_prev
    bind "mod+Shift+l" send_monitor_next

    bind "mod+bracketleft" decrease_mfact
    bind "mod+bracketright" increase_mfact
    bind "mod+Shift+Return" zoom_master

    bind "mod+f" fullscreen
    bind "mod+s" toggle_sync
    bind "mod+q" kill_client
    bind "mod+Shift+r" reload
    bind "mod+Shift+q" quit

    bind "mod+1" view_ws_1
    bind "mod+2" view_ws_2
    bind "mod+3" view_ws_3
    bind "mod+4" view_ws_4
    bind "mod+5" view_ws_5
    bind "mod+6" view_ws_6
    bind "mod+7" view_ws_7
    bind "mod+8" view_ws_8
    bind "mod+9" view_ws_9

    bind "mod+Shift+1" send_ws_1
    bind "mod+Shift+2" send_ws_2
    bind "mod+Shift+3" send_ws_3
    bind "mod+Shift+4" send_ws_4
    bind "mod+Shift+5" send_ws_5
    bind "mod+Shift+6" send_ws_6
    bind "mod+Shift+7" send_ws_7
    bind "mod+Shift+8" send_ws_8
    bind "mod+Shift+9" send_ws_9
}

modules {
    left monitor
    left sync
    left workspaces

    center title

    right network
    right battery
    right volume
    right clock "%Y-%m-%d %H:%M"
}

#include "~/.local/state/loom/generated/vwm-theme.conf"
