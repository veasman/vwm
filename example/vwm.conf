general {
    font "FiraCode Nerd Font"
    font_size 11

    border_px 2
    gap_px 8
    sync_workspaces true
}

theme {
    bg 0x111111
    surface 0x1b1b1b
    text 0xf2f2f2
    text_muted 0x5c5c5c
    accent 0x6bacac
    accent_soft 0x458588
    border 0x353535
}

bar {
    enabled true
    background true
    modules flat

    icons true
    colors true
    minimal true

    position top
    height 24
    radius 0

    margin_x 0
    margin_y 0

    content_margin_x 12
    content_margin_y 2

    gap 18
    padding_x 12
    padding_y 0

    volume_bar_enabled true
    volume_bar_width 46
    volume_bar_height 6
    volume_bar_radius 10

    modules {
        left monitor
        left workspaces
        left sync

        center title
        #center media

        right network
        right memory
        right weather
        right brightness
        right volume
        right clock "%a %d %b %H:%M"
    }
}

scratchpad {
    command "kitty sh -c 'nvim ~/.dotfiles/personal/TODO.md'"
    width_pct 94
    height_pct 94
    dim_alpha 96
}

rules {
    float class "loom-ui"
    float class "pavucontrol"
    float class "mpv"

    workspace 4 class "pavucontrol"
}

commands {
    terminal "kitty"
    launcher "rofi -show drun"
    mixer "pavucontrol"
    loom-menu "loom menu"
    screenshot "flameshot gui"
    po-player "po-player"

    vol-up "wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+"
    vol-down "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
    vol-mute "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

    bright-up "brightnessctl set +10%"
    bright-down "brightnessctl set 10%-"

    media-play "playerctl play-pause"
    media-next "playerctl next"
    media-prev "playerctl previous"
}

binds {
    "mod+t" spawn "loom-menu"
    "mod+Shift+s" spawn "screenshot"
    "mod+Shift+v" spawn "po-player"

    "mod+Return" spawn "terminal"
    "mod+d" spawn "launcher"
    "mod+Shift+m" spawn "mixer"
    "mod+apostrophe" scratchpad

    "mod+j" focus_next
    "mod+k" focus_prev
    "mod+h" focus_monitor_prev
    "mod+l" focus_monitor_next
    "mod+Shift+h" send_monitor_prev
    "mod+Shift+l" send_monitor_next

    "mod+bracketleft" decrease_mfact
    "mod+bracketright" increase_mfact
    "mod+Shift+Return" zoom_master

    "mod+f" fullscreen
    "mod+s" toggle_sync
    "mod+q" kill_client
    "mod+Shift+r" reload
    "mod+Shift+q" quit

    "mod+1" view_ws 1
    "mod+2" view_ws 2
    "mod+3" view_ws 3
    "mod+4" view_ws 4
    "mod+5" view_ws 5
    "mod+6" view_ws 6
    "mod+7" view_ws 7
    "mod+8" view_ws 8
    "mod+9" view_ws 9

    "mod+Shift+1" send_ws 1
    "mod+Shift+2" send_ws 2
    "mod+Shift+3" send_ws 3
    "mod+Shift+4" send_ws 4
    "mod+Shift+5" send_ws 5
    "mod+Shift+6" send_ws 6
    "mod+Shift+7" send_ws 7
    "mod+Shift+8" send_ws 8
    "mod+Shift+9" send_ws 9

    "XF86AudioRaiseVolume" spawn "vol-up"
    "XF86AudioLowerVolume" spawn "vol-down"
    "XF86AudioMute" spawn "vol-mute"

    "XF86MonBrightnessUp" spawn "bright-up"
    "XF86MonBrightnessDown" spawn "bright-down"

    "XF86AudioPlay" spawn "media-play"
    "XF86AudioNext" spawn "media-next"
    "XF86AudioPrev" spawn "media-prev"
}

# If using https://github.com/veasman/loom
# include "~/.local/state/loom/generated/vwm-theme.conf"
