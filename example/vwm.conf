# vwm configuration
# ~/.config/vwm/vwm.conf
#
# Reload with mod+Shift+r or: pkill -HUP vwm
# Lines starting with # are comments.
# Use `include` to split config across files (max depth 16).

# ----------------------------------------------------------------------
# General
# ----------------------------------------------------------------------

general {
    font "FiraCode Nerd Font"   # font / font_family
    font_size 10                # bar and title font size

    border_px 2                 # border_px / border_width
    gap_px 8                    # gap between tiled windows
    default_mfact 0.5           # master area ratio (0.05 - 0.95)
    sync_workspaces true        # all monitors share the same workspace
}

# ----------------------------------------------------------------------
# Theme
# All values are 0xRRGGBB hex colors.
# These derive border, bar, and workspace indicator colors at runtime.
# ----------------------------------------------------------------------

theme {
    bg 0x111111                 # bg / background
    surface 0x1b1b1b
    text 0xf2f2f2
    text_muted 0x5c5c5c        # text_muted / muted
    accent 0x6bacac
    accent_soft 0x458588
    border 0x353535
}

# ----------------------------------------------------------------------
# Bar
# ----------------------------------------------------------------------

bar {
    enabled true                # show/hide the bar entirely
    background true             # draw bar background
    position top                # top / bottom

    height 24                   # bar height in pixels
    radius 0                    # corner radius (pill-style modules)

    # Module rendering style:
    #   flat - text only
    #   pill - rounded pill backgrounds behind each module
    modules flat

    icons true                  # show nerd-font icons in modules
    colors true                 # colorize modules by state
    minimal false               # minimal presentation mode

    # Outer margins (bar window inset from screen edge)
    margin_x 0
    margin_y 0

    # Inner content margins
    content_margin_x 12
    content_margin_y 0

    # Spacing between modules
    gap 18
    padding_x 12
    padding_y 0

    # Inline volume bar graph
    volume_bar_enabled true
    volume_bar_width 46
    volume_bar_height 6
    volume_bar_radius 10

    # Module placement - each line: <section> <module> [arg]
    # Sections: left, center, right
    #
    # Built-in modules:
    #   workspaces  - workspace indicators
    #   monitor     - current monitor id
    #   sync        - workspace sync mode indicator
    #   title       - focused window title
    #   status      - root window WM_NAME text
    #   clock       - time/date (optional strftime format arg)
    #   volume      - audio volume (PipeWire/PulseAudio via wpctl)
    #   network     - network connectivity (wifi alias also works)
    #   battery     - battery charge and status
    #   brightness  - screen brightness (via brightnessctl)
    #   media       - media player info (via playerctl)
    #   memory      - RAM usage percentage (ram alias also works)
    #   weather     - weather from VWM_WEATHER_CMD env var
    #   custom      - arbitrary shell command (re-runs every draw)
    #
    # Script modules (cached, icon, configurable interval):
    #   script:weather   - VWM_WEATHER_CMD, 15min interval
    #   script:printer   - idle printer count, 30s
    #   script:mail      - VWM_MAIL_CMD, 1min
    #   script:updates   - checkupdates count, 30min
    #   script:uptime    - system uptime, 1min
    #   script:cpu       - CPU usage %, 2s
    #   script:disk      - root partition usage, 1min
    #   script:swap      - swap usage, 5s
    #   script:loadavg   - 1-minute load average, 5s
    #   script:kernel    - kernel version, 1hr
    #   script:packages  - installed package count, 1hr
    #
    # Custom script modules auto-create when referenced:
    #   script:my_thing  - runs VWM_MY_THING_CMD, 10s default

    modules {
        left monitor
        left workspaces
        left sync

        center title

        right network
        right memory
        right weather
        right battery
        right brightness
        right volume
        right clock "%a %d %b %H:%M"

        # Script module examples (uncomment to enable):
        # right script:updates
        # right script:uptime
        # right script:cpu
        # right script:disk
        # right script:loadavg
        # right script:swap
        # right script:kernel
        # right script:packages
        # right script:printer
        # right script:mail
        # right script:weather

        # Custom command module (no caching, runs every bar draw):
        # right custom "cat /tmp/my-status"

        # Media module:
        # center media
    }
}

# ----------------------------------------------------------------------
# Scratchpad
# A floating overlay workspace toggled with a keybind.
# Autostart commands run on first toggle if the scratchpad is empty.
# Multiple autostart entries spawn multiple windows in the overlay.
# ----------------------------------------------------------------------

scratchpad {
    width_pct 94                # overlay width (40-100% of monitor)
    height_pct 94               # overlay height (40-100% of monitor)
    dim_alpha 96                # background dim opacity (0-255)

    # command "kitty"           # fallback if no autostart entries

    # Autostart commands run on first toggle if the overlay is empty.
    # Multiple entries spawn multiple windows in the overlay.
    autostart "kitty sh -c 'nvim ~/.dotfiles/personal/TODO.md'"
    autostart "kitty -e htop"

    # Named scratchpads: individually togglable windows within the overlay.
    # Format: define "name" "command" class "WM_CLASS"
    # Bind them with: "mod+key" scratchpad "name"
    # define "term" "kitty" class "kitty"
    # define "mixer" "pavucontrol" class "pavucontrol"
    # define "music" "spotify" class "Spotify"
}

# ----------------------------------------------------------------------
# Rules
# Float and workspace placement rules matched by WM_CLASS.
# ----------------------------------------------------------------------

rules {
    # Force windows to float
    float class "pavucontrol"
    float class "mpv"

    # Assign to workspace (1-9)
    workspace 8 class "Mail"
    workspace 8 class "thunderbird-esr"

    # Assign to workspace on a specific monitor (1-indexed)
    # workspace 3 class "firefox" monitor 1
    # workspace 4 class "discord" monitor 2
}

# ----------------------------------------------------------------------
# Autostart
# Commands run once at startup. Not re-run on config reload.
# Optional class/workspace/monitor targeting creates placement rules.
# ----------------------------------------------------------------------

autostart {
    run "dunst"
    run "picom --config ~/.config/picom/picom.conf"

    # Workspace/monitor targeting (creates a matching rule automatically):
    # run "thunderbird" class "Mail" workspace 8
    # run "firefox" class "firefox" workspace 3 monitor 1
}

# ----------------------------------------------------------------------
# Commands
# Named commands referenced by keybinds via `spawn "name"`.
# Commands are split into argv (no shell expansion).
# ----------------------------------------------------------------------

commands {
    browser "floorp"
    launcher "rofi -show drun"
    screenshot "scrot"
    terminal "kitty"

    file-manager "pcmanfm"
    mail "thunderbird"
    mixer "pavucontrol"

    vol-up "wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+"
    vol-down "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
    vol-mute "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

    bright-up "brightnessctl set +10%"
    bright-down "brightnessctl set 10%-"

    media-play "playerctl play-pause"
    media-next "playerctl next"
    media-prev "playerctl previous"
}

# ----------------------------------------------------------------------
# Keybinds
# Format: "modifier+key" action [arg]
#
# Modifiers: mod (Super), Shift, Ctrl, Alt
# Actions:
#   spawn "cmd-name"    - run a named command
#   scratchpad          - toggle scratchpad overlay
#   focus_next/prev     - cycle focus between tiled windows
#   focus_monitor_next/prev - move focus between monitors
#   send_monitor_next/prev  - send focused window to next/prev monitor
#   decrease/increase_mfact - resize master area
#   zoom_master         - swap focused window into master
#   monocle             - toggle monocle (single window) layout
#   fullscreen          - toggle true fullscreen
#   toggle_sync         - toggle workspace sync across monitors
#   kill_client         - close focused window
#   reload              - reload config (SIGHUP)
#   quit                - exit vwm
#   view_ws N           - switch to workspace N (1-9)
#   send_ws N           - send focused window to workspace N (1-9)
# ----------------------------------------------------------------------

binds {
    "mod+w" spawn "browser"
    "mod+d" spawn "launcher"
    "mod+Shift+s" spawn "screenshot"
    "mod+Return" spawn "terminal"

    "mod+e" spawn "file-manager"
    "mod+t" spawn "mail"
    "mod+m" spawn "mixer"

    "mod+apostrophe" scratchpad          # toggle global overlay

    # Named scratchpad binds (requires matching define in scratchpad block):
    # "mod+F1" scratchpad "term"
    # "mod+F2" scratchpad "mixer"

    "mod+j" focus_next
    "mod+k" focus_prev
    "mod+h" focus_monitor_prev
    "mod+l" focus_monitor_next
    "mod+Shift+h" send_monitor_prev
    "mod+Shift+l" send_monitor_next

    "mod+bracketleft" decrease_mfact
    "mod+bracketright" increase_mfact
    "mod+Shift+Return" zoom_master

    "mod+f" monocle
    "mod+Shift+f" fullscreen
    "mod+s" toggle_sync
    "mod+q" kill_client
    "mod+Shift+r" reload
    "mod+Shift+q" quit

    "mod+1" view_ws 1
    "mod+2" view_ws 2
    "mod+3" view_ws 3
    "mod+4" view_ws 4
    "mod+5" view_ws 5
    "mod+6" view_ws 6
    "mod+7" view_ws 7
    "mod+8" view_ws 8
    "mod+9" view_ws 9

    "mod+Shift+1" send_ws 1
    "mod+Shift+2" send_ws 2
    "mod+Shift+3" send_ws 3
    "mod+Shift+4" send_ws 4
    "mod+Shift+5" send_ws 5
    "mod+Shift+6" send_ws 6
    "mod+Shift+7" send_ws 7
    "mod+Shift+8" send_ws 8
    "mod+Shift+9" send_ws 9

    "XF86AudioRaiseVolume" spawn "vol-up"
    "XF86AudioLowerVolume" spawn "vol-down"
    "XF86AudioMute" spawn "vol-mute"

    "XF86MonBrightnessUp" spawn "bright-up"
    "XF86MonBrightnessDown" spawn "bright-down"

    "XF86AudioPlay" spawn "media-play"
    "XF86AudioNext" spawn "media-next"
    "XF86AudioPrev" spawn "media-prev"
}

# ----------------------------------------------------------------------
# Includes
# Split config into multiple files. Paths are relative to this file
# or absolute. ~ expands to $HOME. Max include depth: 16.
# ----------------------------------------------------------------------

# If using https://github.com/veasman/loom
include "~/.local/state/loom/generated/vwm-theme.conf"
