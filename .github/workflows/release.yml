name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          git archive --format=tar.gz --prefix=vwm-${GITHUB_REF_NAME#v}/ HEAD > vwm-${GITHUB_REF_NAME#v}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vwm-source
          path: vwm-*.tar.gz
