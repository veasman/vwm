# vwm example config
# Main config file. This can include another file that overrides values.

# ---- programs ----
terminal kitty
launcher rofi -show drun
scratchpad kitty
scratchpad_class vwm-scratchpad

# ---- font ----
font_family JetBrainsMono Nerd Font
font_size 11

# ---- layout ----
gap_px 10
border_width 2
default_mfact 0.5

# ---- bar ----
bar_height 22
bar_outer_gap 0

# ---- workspace behavior ----
sync_workspaces yes

# ---- theme override ----
include ./theme.conf
